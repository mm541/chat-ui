name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Run tests
        run: npm run test

      - name: Build library
        run: npm run build

      - name: Check bundle size
        run: |
          echo "📦 Bundle sizes:"
          ls -lh dist/chat-ui.css
          ls -lh dist/chat-ui.js
          ls -lh dist/chat-ui.umd.cjs
